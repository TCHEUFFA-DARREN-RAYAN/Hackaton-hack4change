<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommonGround — Admin Sign in</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="preview-entry" style="justify-content: flex-start; padding-top: 48px;">
    <a href="/" style="position:absolute;top:20px;left:20px;color:var(--primary);text-decoration:none;">← Back</a>
    <h1>CommonGround</h1>
    <p>Admin sign in — manage resources, users & messages</p>
    <div class="auth-form">
      <div id="form-login">
        <input type="email" id="email" placeholder="Admin email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="button" class="btn-primary" id="btn-login" style="width:100%;">Sign in</button>
      </div>
      <p id="auth-msg" style="margin-top:12px;color:var(--warning);font-size:0.9rem;"></p>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    document.getElementById('btn-login').onclick = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { document.getElementById('auth-msg').textContent = 'Email and password required'; return; }
      try {
        await auth.login(email, password, true);
        location.href = '/login?next=/coordinator';
      } catch (err) {
        document.getElementById('auth-msg').textContent = err.message || 'Login failed';
      }
    };
  </script>
</body>
</html>
