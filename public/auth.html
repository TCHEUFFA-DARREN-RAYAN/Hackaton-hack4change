<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — CommonGround</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --purple:      #7c3aed;
      --purple-dark: #6d28d9;
      --purple-deep: #4c1d95;
      --text:        #1e293b;
      --text-muted:  #64748b;
      --border:      #e2e8f0;
      --surface:     #ffffff;
      --critical:    #dc2626;
      --critical-bg: #fef2f2;
      --radius:      8px;
    }

    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--surface);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ─────────────────────────────────────── */
    .auth-split {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    /* ── Left — Form panel ───────────────────────────── */
    .auth-form-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 3rem 2rem;
      background: var(--surface);
    }
    @media (min-width: 768px) {
      .auth-form-panel { width: 50%; }
      .auth-brand-panel { display: flex !important; }
    }

    .auth-inner {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    /* Brand row */
    .auth-logo-row {
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .auth-logo-img {
      width: 38px;
      height: 38px;
      object-fit: contain;
    }
    .auth-logo-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.02em;
    }

    /* Heading */
    .auth-heading h1 {
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -.025em;
      color: var(--text);
    }
    .auth-heading p {
      font-size: .9rem;
      color: var(--text-muted);
      margin-top: .3rem;
    }

    /* Form fields */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: .35rem;
    }
    .field-label {
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
    }
    .field-input {
      height: 44px;
      padding: 0 .875rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: .9rem;
      font-family: var(--font);
      color: var(--text);
      background: var(--surface);
      outline: none;
      width: 100%;
      transition: border-color .18s, box-shadow .18s;
    }
    .field-input::placeholder { color: #94a3b8; }
    .field-input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(124,58,237,.14);
    }
    .field-input.is-invalid { border-color: var(--critical); }
    .field-error {
      font-size: .78rem;
      color: var(--critical);
      display: none;
    }
    .field-error.visible { display: block; }

    /* Password eye toggle */
    .field-password-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .field-input-pw {
      padding-right: 2.5rem;
      width: 100%;
    }
    .pw-eye-btn {
      position: absolute;
      right: .75rem;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      color: #94a3b8;
      display: flex;
      align-items: center;
      transition: color .15s;
    }
    .pw-eye-btn:hover { color: var(--text); }

    /* Remember me */
    .auth-remember {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .875rem;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }
    .auth-remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--purple);
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Error banner */
    .auth-error {
      display: none;
      padding: .65rem .875rem;
      border-radius: var(--radius);
      font-size: .85rem;
      background: var(--critical-bg);
      color: var(--critical);
      border: 1px solid rgba(220,38,38,.2);
    }
    .auth-error.visible { display: block; }

    /* Submit button */
    .auth-btn {
      height: 46px;
      width: 100%;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: .95rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: background .18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      margin-top: .25rem;
    }
    .auth-btn:hover:not(:disabled) { background: var(--purple-dark); }
    .auth-btn:disabled { opacity: .6; cursor: not-allowed; }

    .auth-btn .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    .auth-btn.loading .spinner  { display: block; }
    .auth-btn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Right — Brand panel ─────────────────────────── */
    .auth-brand-panel {
      display: none;
      width: 50%;
      position: relative;
      background: linear-gradient(160deg, #92a5f1 0%, #EEF2FF 40%, #92a5f1 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      overflow: hidden;
    }

    /* Decorative circles */
    .auth-brand-panel::before,
    .auth-brand-panel::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(146,165,241,.18);
      pointer-events: none;
    }
    .auth-brand-panel::before {
      width: 480px;
      height: 480px;
      top: -140px;
      right: -140px;
    }
    .auth-brand-panel::after {
      width: 340px;
      height: 340px;
      bottom: -100px;
      left: -80px;
    }

    .auth-brand-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .auth-brand-logo {
      width: 160px;
      height: auto;
      object-fit: contain;
      margin-bottom: 1.5rem;
      border-radius: 16px;
    }
    .auth-brand-name {
      color: #3730a3;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -.02em;
    }
    .auth-brand-tagline {
      color: #6366f1;
      font-size: .9rem;
      margin-top: .4rem;
      max-width: 240px;
      line-height: 1.55;
    }
  </style>
</head>
<body>

<div class="auth-split">

  <!-- Left: Form -->
  <div class="auth-form-panel">
    <div class="auth-inner">

      <div class="auth-logo-row">
        <img src="/assets/images/logo.png" alt="CommonGround logo" class="auth-logo-img">
        <span class="auth-logo-name">Common Ground</span>
      </div>

      <div class="auth-heading">
        <h1>Welcome!</h1>
        <p>Sign in by entering the information below</p>
      </div>

      <div id="auth-error" class="auth-error"></div>

      <form id="login-form" class="auth-form" onsubmit="handleLogin(event)" novalidate>

        <div class="field-group">
          <label class="field-label" for="email">Email Address</label>
          <input type="email" id="email" class="field-input"
                 autocomplete="email" placeholder="email@example.com" autofocus>
          <span class="field-error" id="err-email">Please enter a valid email address.</span>
        </div>

        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <div class="field-password-wrap">
            <input type="password" id="password" class="field-input field-input-pw"
                   autocomplete="current-password" placeholder="••••••••••••">
            <button type="button" class="pw-eye-btn" onclick="togglePwVisibility()" tabindex="-1" aria-label="Toggle password visibility">
              <svg id="pw-eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="err-password">Please enter your password.</span>
        </div>

        <label class="auth-remember">
          <input type="checkbox" id="remember-me">
          Remember Me
        </label>

        <button type="submit" class="auth-btn" id="btn-login">
          <span class="spinner"></span>
          <span class="btn-text">Continue</span>
        </button>

      </form>

    </div>
  </div>

  <!-- Right: Purple gradient + logo -->
  <div class="auth-brand-panel">
    <div class="auth-brand-content">
      <img src="/assets/images/logo.png" alt="CommonGround" class="auth-brand-logo">
      <span class="auth-brand-name">CommonGround</span>
      <p class="auth-brand-tagline">Donation Coordination Network</p>
    </div>
  </div>

</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
  function showError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg;
    el.classList.add('visible');
  }
  function hideError() {
    document.getElementById('auth-error').classList.remove('visible');
  }

  async function handleLogin(e) {
    e.preventDefault();
    const emailEl = document.getElementById('email');
    const passEl  = document.getElementById('password');
    const errEmail = document.getElementById('err-email');
    const errPass  = document.getElementById('err-password');

    let valid = true;
    const emailOk = emailEl.value.trim() && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value.trim());
    if (!emailOk) {
      emailEl.classList.add('is-invalid');
      errEmail.classList.add('visible');
      valid = false;
    } else {
      emailEl.classList.remove('is-invalid');
      errEmail.classList.remove('visible');
    }
    if (!passEl.value) {
      passEl.classList.add('is-invalid');
      errPass.classList.add('visible');
      valid = false;
    } else {
      passEl.classList.remove('is-invalid');
      errPass.classList.remove('visible');
    }
    if (!valid) return;

    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.classList.add('loading');
    hideError();

    try {
      const res = await auth.login(emailEl.value.trim(), passEl.value);
      const next = new URLSearchParams(window.location.search).get('next');
      if (next && next.startsWith('/')) {
        window.location.href = next;
      } else {
        window.location.href = (res.data && res.data.isAdmin) ? '/coordinator' : '/staff';
      }
    } catch (err) {
      showError(err.message || 'Invalid email or password. Please try again.');
      passEl.value = '';
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  function togglePwVisibility() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('pw-eye-icon');
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    icon.innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }

  (async function checkSession() {
    try {
      const res = await auth.me();
      if (res.data) {
        const next = new URLSearchParams(window.location.search).get('next');
        if (next && next.startsWith('/')) {
          window.location.href = next;
        } else if (res.data.isAdmin) {
          window.location.href = '/coordinator';
        } else {
          window.location.href = '/staff';
        }
      }
    } catch {}
  })();
</script>

</body>
</html>
