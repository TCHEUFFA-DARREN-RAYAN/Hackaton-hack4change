<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — CommonGround</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="login-page">
    <div class="login-box">
        <div class="login-logo">
            <img src="/assets/images/logo.png" alt="Common Ground" class="login-logo-img">
            <p class="login-subtitle">CommonGround Donation Coordination Network</p>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)" novalidate>
            <div class="form-group">
                <label class="form-label" for="email">Email address</label>
                <input type="email" id="email" class="form-control" autocomplete="email" placeholder="your@email.com" required>
                <div class="form-error" id="err-email">Please enter your email address.</div>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-control" autocomplete="current-password" placeholder="Your password" required>
                <div class="form-error" id="err-password">Please enter your password.</div>
            </div>
            <div id="login-error" class="inline-notice error" style="display:none;margin-bottom:1rem"></div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">Sign in</button>
        </form>

        <div style="margin-top:1.5rem;text-align:center">
            <a href="/" class="text-sm text-muted">Back to Needs Board</a>
        </div>

        <div class="divider"></div>
        <div style="font-size:.75rem;color:var(--color-text-light);text-align:center;line-height:1.6">
            For access, contact your organization's administrator<br>or the CommonGround Coordinator.
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
    // Check if already logged in
    (async function () {
        try {
            const res = await auth.me();
            if (res.data) redirectAfterLogin(res.data);
        } catch {}
    })();

    function redirectAfterLogin(user) {
        const next = new URLSearchParams(window.location.search).get('next');
        if (next && (next.startsWith('/staff') || next.startsWith('/coordinator'))) {
            window.location.href = next;
        } else if (user.isAdmin) {
            window.location.href = '/coordinator';
        } else {
            window.location.href = '/staff';
        }
    }

    async function handleLogin(e) {
        e.preventDefault();

        const emailEl = document.getElementById('email');
        const passEl  = document.getElementById('password');
        const errEl   = document.getElementById('login-error');
        const btn     = document.getElementById('login-btn');

        let valid = true;
        if (!emailEl.value.trim()) {
            emailEl.classList.add('error');
            document.getElementById('err-email').classList.add('visible');
            valid = false;
        } else {
            emailEl.classList.remove('error');
            document.getElementById('err-email').classList.remove('visible');
        }
        if (!passEl.value) {
            passEl.classList.add('error');
            document.getElementById('err-password').classList.add('visible');
            valid = false;
        } else {
            passEl.classList.remove('error');
            document.getElementById('err-password').classList.remove('visible');
        }
        if (!valid) return;

        btn.disabled = true;
        btn.textContent = 'Signing in...';
        errEl.style.display = 'none';

        try {
            const res = await auth.login(emailEl.value.trim(), passEl.value);
            redirectAfterLogin(res.data);
        } catch (err) {
            errEl.textContent = err.message || 'Sign in failed. Check your email and password.';
            errEl.style.display = 'block';
            passEl.value = '';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sign in';
        }
    }
</script>

</body>
</html>
