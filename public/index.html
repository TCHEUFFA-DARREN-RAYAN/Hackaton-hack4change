<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommonGround — What shelters need right now</title>
    <script src="/js/i18n.js"></script>
    <meta name="description" content="See what Moncton's homeless-serving organizations need and donate directly to those with the greatest need.">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="site-nav site-nav--dark">
    <div class="nav-inner">
        <a href="/" class="nav-brand"><img src="/assets/images/logo.png" alt="Common Ground"> <span data-i18n="navBrand">GMHSC Network</span></a>
        <div class="nav-actions">
            <a href="/donate" class="btn btn-ghost btn-sm" style="margin-right:0.5rem" data-i18n="navDonate">Donate</a>
            <a href="/all-needs" class="btn btn-ghost btn-sm" style="margin-right:0.5rem" data-i18n="seeAllNeeds">See all needs</a>
            <button type="button" class="btn btn-ghost btn-sm" onclick="i18n.switchLocale()" title="EN / FR">EN / FR</button>
            <a href="/login" class="btn btn-ghost btn-sm" data-i18n="navStaffLogin">Staff login</a>
        </div>
    </div>
</nav>

<div class="hero hero-with-shader">
    <div id="hero-shader-container" class="hero-shader-bg" aria-hidden="true"></div>
    <div class="container hero-content">
        <h1 data-i18n="pageTitle">Community Needs Board</h1>
        <p data-i18n="pageDescription">28 Greater Moncton organizations. One coordinated platform.</p>
        <div class="hero-actions">
            <a href="/donate" class="btn btn-hero btn-lg" data-i18n="heroCta">Donate now</a>
        </div>
    </div>
</div>

<div class="container" style="padding: 1.5rem 1rem 2.5rem">
    <div class="org-grid" id="urgent-needs">
        <div class="org-card">
            <div class="org-card-header">
                <div><div class="skeleton skeleton-text wide"></div><div class="skeleton skeleton-text short" style="margin-top:.5rem"></div></div>
            </div>
            <div class="skeleton skeleton-block"></div>
        </div>
        <div class="org-card">
            <div class="org-card-header">
                <div><div class="skeleton skeleton-text wide"></div><div class="skeleton skeleton-text short" style="margin-top:.5rem"></div></div>
            </div>
            <div class="skeleton skeleton-block"></div>
        </div>
        <div class="org-card">
            <div class="org-card-header">
                <div><div class="skeleton skeleton-text wide"></div><div class="skeleton skeleton-text short" style="margin-top:.5rem"></div></div>
            </div>
            <div class="skeleton skeleton-block"></div>
        </div>
    </div>

    <div class="urgent-actions">
        <a href="/all-needs" class="btn btn-outline btn-lg" data-i18n="seeAllNeeds">See all needs</a>
    </div>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="/js/shader-hero.js"></script>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
    i18n.apply();
    const CAT_LABELS = i18n.CAT_LABELS();
    const URGENCY_LABELS = i18n.URGENCY_LABELS();
    const URGENCY_RANK = { critical: 0, high: 1, medium: 2, low: 3 };
    const TOP_URGENT_COUNT = 3;

    function getTopUrgentNeeds(orgs) {
        const flat = [];
        for (const org of orgs) {
            for (const n of (org.top_needs || [])) {
                if (n.urgency === 'critical' || n.urgency === 'high') {
                    flat.push({ ...n, org });
                }
            }
        }
        flat.sort((a, b) => (URGENCY_RANK[a.urgency] ?? 4) - (URGENCY_RANK[b.urgency] ?? 4));
        return flat.slice(0, TOP_URGENT_COUNT);
    }

    function renderUrgentNeeds(needs) {
        const el = document.getElementById('urgent-needs');
        if (!needs.length) {
            el.innerHTML = `<div style="grid-column:1/-1"><div class="empty-state"><span class="empty-icon">&#10003;</span><h3>${i18n.t('noActiveNeedsPosted')}</h3></div></div>`;
            return;
        }
        el.innerHTML = needs.map(n => {
            const org = n.org;
            const needHtml = `
                <div class="need-item">
                    <span class="badge badge-${escHtml(n.urgency)}" style="flex-shrink:0">${escHtml(URGENCY_LABELS[n.urgency] || n.urgency)}</span>
                    <span class="need-name">${escHtml(n.item_name)}</span>
                    <span class="need-qty">${escHtml(String(n.quantity_needed))} ${escHtml(n.unit)}</span>
                </div>`;
            return `
                <div class="org-card has-critical">
                    <div class="org-card-header">
                        <div>
                            <div class="org-card-name">${escHtml(org.name)}</div>
                            <div class="org-card-meta">${escHtml(org.address || '')}</div>
                        </div>
                        <span class="badge badge-${escHtml(org.category)}">${escHtml(CAT_LABELS[org.category] || org.category)}</span>
                    </div>
                    <div class="needs-list">${needHtml}</div>
                    <div class="org-card-footer">
                        <span class="updated">${i18n.t('updated')} ${timeAgo(org.updated_at)}</span>
                        <a href="/donate?org=${encodeURIComponent(org.id)}" class="btn btn-primary btn-sm">${i18n.t('donate')}</a>
                    </div>
                </div>`;
        }).join('');
    }

    async function loadUrgentNeeds() {
        try {
            const res = await pub.orgsWithNeeds();
            const orgs = res.data || [];
            const top = getTopUrgentNeeds(orgs);
            renderUrgentNeeds(top);
        } catch {
            document.getElementById('urgent-needs').innerHTML = `
                <div style="grid-column:1/-1">
                    <div class="inline-notice error">${i18n.t('failedToLoad')}</div>
                </div>`;
        }
    }

    loadUrgentNeeds();
    setInterval(loadUrgentNeeds, 30000);
</script>

</body>
</html>
