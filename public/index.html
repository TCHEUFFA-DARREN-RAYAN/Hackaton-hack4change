<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommonGround — What shelters need right now</title>
    <script src="/js/i18n.js"></script>
    <meta name="description" content="See what Moncton's homeless-serving organizations need and donate directly to those with the greatest need.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            background: #F5F7FA;
            font-size: 16px;
            color: #1A2332;
        }
        .hero .btn:hover {
            background: #4338CA !important;
            box-shadow: 0 2px 4px rgba(0,0,0,.08), 0 6px 24px rgba(106, 99, 243, 0.35) !important;
            transform: translateY(-1px);
        }
        .hero .btn:active { transform: translateY(0) scale(0.97); }
        .hero p { max-width: 540px; margin-left: auto; margin-right: auto; line-height: 1.6; }
        .empty-state h3 { font-size: 1.1rem; color: #1A2332; }
        .empty-state p { font-size: .95rem; color: #6B7B8F; }
    </style>
    <style>
        .org-list { display: flex; flex-direction: column; gap: .6rem; }

        .org-row {
            background: #fff;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            overflow: hidden;
            transition: box-shadow .2s ease, border-color .2s ease;
        }
        .org-row:hover { box-shadow: 0 2px 8px rgba(0,0,0,.05); border-color: #CBD5E1; }

        .org-row-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            cursor: pointer;
            user-select: none;
        }
        .org-row-header:hover { background: #F8FAFC; }

        .org-row-name  { font-weight: 600; font-size: 1.05rem; color: #1A2332; flex: 1; letter-spacing: -0.01em; }
        .org-row-meta  { font-size: .85rem; color: #7B8CA0; margin-top: .15rem; }

        .org-row-badges { display: flex; align-items: center; gap: .45rem; flex-shrink: 0; }

        .need-count-badge {
            display: inline-flex; align-items: center; gap: .25rem;
            font-size: .78rem; font-weight: 600;
            padding: 3px 10px; border-radius: 20px;
            background: #EDF5FD; border: 1px solid #C8DEF2;
            color: #1a6fb5;
        }

        .cat-label {
            font-size: .75rem; font-weight: 500;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: .03em;
        }

        .chevron {
            width: 18px; height: 18px; flex-shrink: 0;
            color: #94A3B8;
            transition: transform .2s ease;
        }
        .org-row.open .chevron { transform: rotate(180deg); color: #1e9df1; }

        .org-row-needs {
            display: none;
            border-top: 1px solid #EEF2F6;
            padding: .75rem 1.25rem 1rem;
            background: #FAFBFC;
        }
        .org-row.open .org-row-needs { display: block; }

        .need-row {
            display: flex; align-items: flex-start; gap: .75rem;
            padding: .6rem 0;
            border-bottom: 1px solid #F1F5F9;
        }
        .need-row:last-child { border-bottom: none; }

        .need-priority {
            display: inline-flex; align-items: center; gap: .3rem;
            font-size: .72rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: .03em;
            padding: 3px 8px; border-radius: 4px;
            flex-shrink: 0; margin-top: 2px;
        }
        .need-priority.p-critical { background: #FEF2F2; color: #991B1B; }
        .need-priority.p-high     { background: #FFF7ED; color: #9A3412; }
        .need-priority.p-medium   { background: #FFFBEB; color: #854D0E; }
        .need-priority.p-low      { background: #F0FDF4; color: #166534; }

        .need-row-name  { flex: 1; font-size: .95rem; color: #1A2332; font-weight: 500; }
        .need-row-qty   { font-size: .88rem; color: #64748B; white-space: nowrap; font-weight: 500; font-feature-settings: "tnum"; }
        .need-row-notes { font-size: .82rem; color: #8896A6; margin-top: .1rem; line-height: 1.45; }

        .org-row-footer {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: .75rem; padding-top: .65rem;
            border-top: 1px solid #F1F5F9;
        }

        /* Filter bar */
        .filters-bar {
            background: #fff;
            border-bottom: 1px solid #E8ECF1;
            position: sticky; top: 56px; z-index: 50;
        }
        .filters-inner {
            max-width: 920px; margin: 0 auto;
            padding: .75rem 1.25rem;
            display: flex; flex-wrap: wrap; gap: .6rem; align-items: center;
        }
        .filters-inner input[type="search"],
        .filters-inner select,
        .filters-inner .sort-btn {
            height: 42px;
            padding: 0 .9rem;
            border: 1.5px solid #D8DEE6;
            border-radius: 10px;
            background: #F8FAFC;
            font-size: 1rem; font-family: var(--font-sans);
            color: #1A2332; outline: none; cursor: pointer;
            transition: border-color .2s ease, box-shadow .2s ease;
        }
        .filters-inner input[type="search"] { flex: 1; min-width: 200px; }
        .filters-inner input[type="search"]:focus,
        .filters-inner select:focus,
        .filters-inner .sort-btn:hover { border-color: #1e9df1; box-shadow: 0 0 0 3px rgba(30,157,241,.08); }
        .filters-inner .sort-btn.active {
            border-color: #1e9df1;
            background: #EDF5FD;
            color: #1a6fb5;
            font-weight: 600;
        }

        .results-count {
            font-size: .95rem; color: #6B7B8F;
            margin-left: auto; white-space: nowrap;
        }

        /* Pagination */
        .pagination {
            display: flex; align-items: center; justify-content: center;
            gap: .5rem; padding: 2rem 0 .75rem;
        }
        .page-btn {
            min-width: 40px; height: 40px; padding: 0 .7rem;
            border: 1.5px solid #D8DEE6;
            border-radius: 10px;
            background: #fff;
            color: #6B7B8F;
            font-size: 1rem; font-family: var(--font-sans);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background .15s, border-color .15s, color .15s;
        }
        .page-btn:hover:not(:disabled) { border-color: #1e9df1; color: #1a6fb5; background: #EDF5FD; }
        .page-btn.active { background: #1e9df1; border-color: #1e9df1; color: #fff; }
        .page-btn:disabled { opacity: .35; cursor: not-allowed; }
        .page-info { font-size: .95rem; color: #8896A6; padding: 0 .3rem; }

        .org-list-wrap { max-width: 920px; margin: 0 auto; padding: 1.5rem 1.25rem 3.5rem; }

        /* Impact bar */
        .impact-bar {
            background: #fff;
            border-bottom: 1px solid #E8ECF1;
            padding: 1rem 0;
        }
        .impact-inner {
            max-width: 920px; margin: 0 auto;
            padding: 0 1.25rem;
            display: flex; justify-content: space-around; gap: .75rem; flex-wrap: wrap;
        }
        .impact-stat {
            display: flex; flex-direction: column; align-items: center; gap: .2rem;
            min-width: 90px; padding: .5rem .75rem;
        }
        .impact-number {
            font-size: 1.75rem; font-weight: 700; color: #1A2332;
            font-feature-settings: "tnum"; letter-spacing: -.02em;
        }
        .impact-label {
            font-size: .8rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: .04em; color: #8896A6;
        }

        @media (max-width: 600px) {
            .org-row-header  { flex-wrap: wrap; gap: .6rem; padding: .85rem 1rem; }
            .org-row-footer  { flex-direction: column; align-items: flex-start; gap: .5rem; }
            .filters-inner   { gap: .4rem; }
            .filters-inner input[type="search"] { min-width: 140px; }
            .impact-inner { gap: .4rem; }
            .impact-stat { min-width: 70px; }
            .impact-number { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<nav class="site-nav" style="background:#fff; border-bottom:1px solid #E8ECF1; box-shadow:0 1px 3px rgba(0,0,0,.03);">
    <div class="nav-inner">
        <a href="/" class="nav-brand"><img src="/assets/images/logo.png" alt="CommonGround"> <span data-i18n="navBrand" style="color:#1A2332; font-weight:700; font-size:1.15rem;">CommonGround</span></a>
        <div class="nav-actions">
            <button type="button" class="btn btn-ghost btn-sm" onclick="i18n.switchLocale()" title="EN / FR" style="color:#6B7B8F; border:1px solid #D8DEE6;">EN / FR</button>
            <a href="/login" class="btn btn-ghost btn-sm" data-i18n="navStaffLogin" style="color:#6B7B8F; border:1px solid #D8DEE6;">Staff login</a>
        </div>
    </div>
</nav>

<div class="hero" style="background: linear-gradient(160deg, #92a5f1 0%, #EEF2FF 40%, #92a5f1 100%); color: #1A2332; padding: 3.5rem 1rem 2.75rem;">
    <div class="container" style="padding-top: 1rem; padding-bottom: .5rem;">
        <h1 data-i18n="pageTitle" style="font-size: 2.8rem; letter-spacing: -0.03em; color: #1A2332; font-weight: 700;">Community Needs Board</h1>
        <p data-i18n="pageDescription" style="color: #4B5C6F; font-size: 1.2rem; opacity: 1;">28 Greater Moncton organizations. One coordinated platform.</p>
        <div class="hero-actions" style="margin-top: 2rem;">
            <a href="/give" class="btn btn-lg" data-i18n="heroCta" style="background:#4F46E5; color:#fff; border:none; font-weight:600; font-size:1.05rem; padding:.8rem 2.25rem; border-radius:12px; box-shadow:0 1px 2px rgba(0,0,0,.06), 0 4px 16px rgba(79,70,229,.25); transition:background .2s ease, box-shadow .2s ease, transform .12s ease;">Donate now</a>
        </div>
    </div>
</div>

<div class="filters-bar">
    <div class="filters-inner">
        <input type="search" id="search" placeholder="Search organizations or items..." autocomplete="off" aria-label="Search">

        <select id="filter-urgency" aria-label="Filter by urgency">
            <option value="">All urgency levels</option>
            <option value="critical">Critical</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
        </select>

        <select id="filter-category" aria-label="Filter by type">
            <option value="">All org types</option>
            <option value="shelter_housing">Shelter &amp; Housing</option>
            <option value="food_nutrition">Food &amp; Nutrition</option>
            <option value="goods_essentials">Goods &amp; Essentials</option>
            <option value="mental_health">Mental Health</option>
            <option value="outreach">Outreach</option>
        </select>

        <button class="sort-btn active" id="sort-btn" onclick="toggleSort()" title="Sort by date" aria-label="Toggle date sort">
            <span id="sort-label">&#8593; Newest</span>
        </button>

        <span class="results-count" id="results-count"></span>
    </div>
</div>

<div class="org-list-wrap">
    <div class="org-list" id="org-list">
        <!-- skeletons -->
        <div class="org-row">
            <div class="org-row-header">
                <div style="flex:1"><div class="skeleton skeleton-text wide"></div><div class="skeleton skeleton-text short" style="margin-top:.4rem;width:55%"></div></div>
                <div class="skeleton" style="width:70px;height:24px;border-radius:999px"></div>
            </div>
        </div>
        <div class="org-row">
            <div class="org-row-header">
                <div style="flex:1"><div class="skeleton skeleton-text" style="width:65%"></div><div class="skeleton skeleton-text short" style="margin-top:.4rem;width:45%"></div></div>
                <div class="skeleton" style="width:60px;height:24px;border-radius:999px"></div>
            </div>
        </div>
        <div class="org-row">
            <div class="org-row-header">
                <div style="flex:1"><div class="skeleton skeleton-text" style="width:72%"></div><div class="skeleton skeleton-text short" style="margin-top:.4rem;width:50%"></div></div>
                <div class="skeleton" style="width:65px;height:24px;border-radius:999px"></div>
            </div>
        </div>
    </div>
    <div class="pagination" id="pagination" style="display:none"></div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
    i18n.apply();
    const CAT_LABELS    = i18n.CAT_LABELS();
    const URGENCY_LABELS = i18n.URGENCY_LABELS();
    const URGENCY_RANK  = { critical: 0, high: 1, medium: 2, low: 3 };
    const PAGE_SIZE     = 5;

    let allOrgs      = [];
    let filteredOrgs = [];
    let currentPage  = 1;
    let sortNewest   = true;   // true = newest first, false = oldest first
    const openOrgs   = new Set();

    // --- Sorting helpers ---

    function topUrgency(org) {
        if (!org.top_needs.length) return null;
        return org.top_needs.reduce((best, n) =>
            (URGENCY_RANK[n.urgency] ?? 4) < (URGENCY_RANK[best.urgency] ?? 4) ? n : best
        ).urgency;
    }

    function orgDate(org) {
        // Use the most recently created need date as the "last activity" date
        const ts = org.top_needs.length
            ? org.top_needs.reduce((latest, n) => {
                const d = new Date(n.created_at || 0).getTime();
                return d > latest ? d : latest;
            }, 0)
            : new Date(org.updated_at || 0).getTime();
        return ts;
    }

    function sortOrgs(orgs) {
        return [...orgs].sort((a, b) => {
            const urgA = a.top_needs.length ? Math.min(...a.top_needs.map(n => URGENCY_RANK[n.urgency] ?? 3)) : 4;
            const urgB = b.top_needs.length ? Math.min(...b.top_needs.map(n => URGENCY_RANK[n.urgency] ?? 3)) : 4;
            // Primary: urgency
            if (urgA !== urgB) return urgA - urgB;
            // Secondary: date sort toggle
            const dA = orgDate(a);
            const dB = orgDate(b);
            return sortNewest ? dB - dA : dA - dB;
        });
    }

    function toggleSort() {
        sortNewest = !sortNewest;
        document.getElementById('sort-label').textContent = sortNewest ? '↑ Newest' : '↓ Oldest';
        currentPage = 1;
        applyFilters();
    }

    // --- Rendering ---

    function toggleOrg(id) {
        if (openOrgs.has(id)) openOrgs.delete(id);
        else openOrgs.add(id);
        renderPage();
    }

    function renderPage() {
        const el         = document.getElementById('org-list');
        const pagination = document.getElementById('pagination');

        if (!filteredOrgs.length) {
            el.innerHTML = `
                <div class="empty-state">
                    <span class="empty-icon">&#10003;</span>
                    <h3>No organizations match your filters</h3>
                    <p>Try adjusting or clearing the filters above.</p>
                </div>`;
            pagination.style.display = 'none';
            return;
        }

        const totalPages = Math.ceil(filteredOrgs.length / PAGE_SIZE);
        if (currentPage > totalPages) currentPage = 1;

        const pageOrgs = filteredOrgs.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

        el.innerHTML = pageOrgs.map(org => {
            const isOpen   = openOrgs.has(org.id);
            const needCount = org.top_needs.length;
            const countBadge = `<span class="need-count-badge">${needCount} need${needCount !== 1 ? 's' : ''}</span>`;
            const catLabel = `<span class="cat-label">${escHtml(CAT_LABELS[org.category] || org.category)}</span>`;

            const sortedNeeds = [...org.top_needs].sort((a, b) =>
                (URGENCY_RANK[a.urgency] ?? 4) - (URGENCY_RANK[b.urgency] ?? 4)
            );

            const needsHtml = sortedNeeds.map(n => `
                <div class="need-row">
                    <span class="need-priority p-${escHtml(n.urgency)}">${escHtml(URGENCY_LABELS[n.urgency] || n.urgency)}</span>
                    <div style="flex:1">
                        <div class="need-row-name">${escHtml(n.item_name)}</div>
                        ${n.notes ? `<div class="need-row-notes">${escHtml(n.notes)}</div>` : ''}
                    </div>
                    <span class="need-row-qty">${escHtml(String(n.quantity_needed))} ${escHtml(n.unit)}</span>
                </div>`).join('');

            const dateLabel = org.updated_at
                ? `Updated ${timeAgo(org.updated_at)}`
                : '';

            return `
                <div class="org-row${isOpen ? ' open' : ''}" id="org-row-${escHtml(org.id)}">
                    <div class="org-row-header" onclick="toggleOrg('${escHtml(org.id)}')">
                        <div style="flex:1;min-width:0">
                            <div class="org-row-name">${escHtml(org.name)}</div>
                            ${org.address ? `<div class="org-row-meta">${escHtml(org.address)}</div>` : ''}
                        </div>
                        <div class="org-row-badges">
                            ${countBadge}
                            ${catLabel}
                            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </div>
                    </div>
                    <div class="org-row-needs">
                        ${needsHtml}
                        <div class="org-row-footer">
                            <span style="font-size:.85rem; color:#8896A6;">${escHtml(dateLabel)}</span>
                            <a href="/donate?org=${encodeURIComponent(org.id)}" class="btn btn-sm" style="background:#4F46E5; color:#fff; border:none; font-weight:600; border-radius:8px; padding:.45rem 1rem; font-size:.88rem;">Donate &rarr;</a>
                        </div>
                    </div>
                </div>`;
        }).join('');

        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        const el = document.getElementById('pagination');
        if (totalPages <= 1) { el.style.display = 'none'; return; }
        el.style.display = 'flex';

        let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">&#8592;</button>`;

        const delta = 2;
        const range = [];
        for (let i = Math.max(1, currentPage - delta); i <= Math.min(totalPages, currentPage + delta); i++) range.push(i);

        if (range[0] > 1) {
            html += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
            if (range[0] > 2) html += `<span class="page-info">…</span>`;
        }
        range.forEach(p => {
            html += `<button class="page-btn${p === currentPage ? ' active' : ''}" onclick="goToPage(${p})">${p}</button>`;
        });
        if (range[range.length - 1] < totalPages) {
            if (range[range.length - 1] < totalPages - 1) html += `<span class="page-info">…</span>`;
            html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
        }

        html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">&#8594;</button>`;
        html += `<span class="page-info">${currentPage} / ${totalPages}</span>`;

        el.innerHTML = html;
    }

    function goToPage(p) {
        currentPage = p;
        renderPage();
        window.scrollTo({ top: document.querySelector('.filters-bar').offsetTop - 70, behavior: 'smooth' });
    }

    // --- Filtering ---

    function applyFilters() {
        const search  = document.getElementById('search').value.toLowerCase().trim();
        const urgency = document.getElementById('filter-urgency').value;
        const orgCat  = document.getElementById('filter-category').value;

        let result = allOrgs.filter(o => o.top_needs.length > 0); // only orgs with needs

        if (orgCat)  result = result.filter(o => o.category === orgCat);
        if (urgency) result = result.filter(o => o.top_needs.some(n => n.urgency === urgency));
        if (search) {
            result = result.filter(o =>
                o.name.toLowerCase().includes(search) ||
                o.top_needs.some(n => n.item_name.toLowerCase().includes(search))
            );
        }

        filteredOrgs = sortOrgs(result);
        currentPage  = 1;

        const count = filteredOrgs.length;
        document.getElementById('results-count').textContent =
            count + ' ' + (count !== 1 ? 'organizations' : 'organization');

        renderPage();
    }

    async function loadBoard() {
        try {
            const res = await pub.orgsWithNeeds();
            allOrgs = res.data || [];
            applyFilters();
        } catch {
            document.getElementById('org-list').innerHTML =
                `<div class="inline-notice error">Failed to load the needs board. Please refresh.</div>`;
        }
    }

    document.getElementById('search').addEventListener('input', applyFilters);
    document.getElementById('filter-urgency').addEventListener('change', applyFilters);
    document.getElementById('filter-category').addEventListener('change', applyFilters);

    loadBoard();
    setInterval(loadBoard, 30000);
</script>

</body>
</html>
